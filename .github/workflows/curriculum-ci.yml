name: curriculum-ci

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 5 * * 1"

jobs:
  curriculum-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate curriculum (structure, notebooks, links)
        run: python3 scripts/validate_curriculum.py

  import-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Smoke-test critical imports
        run: |
          uv sync --frozen --extra serving --group dev
          uv run python - <<'PY'
          import importlib

          modules = [
              "numpy",
              "pandas",
              "sklearn",
              "matplotlib",
              "fastapi",
              "nbformat",
          ]
          for m in modules:
              importlib.import_module(m)
          print("Import smoke test passed.")
          PY

      - name: Run tests
        run: |
          uv run pytest -q
